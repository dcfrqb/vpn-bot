name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

          - name: Run tests
            env:
              PYTHONPATH: ${{ github.workspace }}/src
            run: |
              pytest -m "not slow" \
                --ignore=tests/test_remna_client_errors.py \
                --ignore=tests/test_no_ui_in_handlers.py \
                --ignore=tests/test_payment_ui_discipline.py \
                --ignore=tests/test_help_screen_flow.py \
                --ignore=tests/test_callback_data_length.py \
                --ignore=tests/test_sync_service.py \
                --ignore=tests/test_force_remna.py \
                -W ignore::DeprecationWarning \
                -W ignore::pytest.PytestConfigWarning \
                -v
