name: Diagnostics

# Запускается ТОЛЬКО вручную через workflow_dispatch
on:
  workflow_dispatch:

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    
    steps:
    - name: Record workflow start time
      id: start_time
      run: |
        echo "workflow_start=$(date +%s)" >> $GITHUB_OUTPUT
    
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Install test dependencies
      run: |
        pip install pytest pytest-cov

    - name: Run unit and logic tests
      id: unit_tests
      env:
        PYTHONPATH: ${{ github.workspace }}/src
      run: |
        echo "::group::Unit and Logic Tests"
        start_time=$(date +%s)
        pytest tests/ -v -m "not perf" || exit_code=$?
        end_time=$(date +%s)
        duration=$((end_time - start_time))
        echo "::endgroup::"
        echo "Unit tests duration: ${duration}s"
        if [ -z "${exit_code:-}" ]; then
          echo "unit_tests_status=passed" >> $GITHUB_OUTPUT
        else
          echo "unit_tests_status=failed" >> $GITHUB_OUTPUT
          exit $exit_code
        fi

    - name: Run performance tests
      id: perf_tests
      continue-on-error: true
      env:
        PYTHONPATH: ${{ github.workspace }}/src
      run: |
        echo "::group::Performance Tests"
        start_time=$(date +%s)
        pytest tests/test_performance.py -v || exit_code=$?
        end_time=$(date +%s)
        duration=$((end_time - start_time))
        echo "::endgroup::"
        echo "Performance tests duration: ${duration}s"
        if [ -z "${exit_code:-}" ]; then
          echo "perf_tests_status=passed" >> $GITHUB_OUTPUT
        else
          echo "perf_tests_status=warning" >> $GITHUB_OUTPUT
          echo "::warning::Performance tests failed, but this is not a critical failure"
        fi

    - name: Summary
      run: |
        echo "::group::Diagnostics Summary"
        end_time=$(date +%s)
        total_duration=$((end_time - ${{ steps.start_time.outputs.workflow_start }}))
        echo "=== Diagnostics Workflow Summary ==="
        echo ""
        echo "Total Workflow Duration: ${total_duration}s"
        echo ""
        echo "Unit Tests Status: ${{ steps.unit_tests.outputs.unit_tests_status }}"
        echo "Performance Tests Status: ${{ steps.perf_tests.outputs.perf_tests_status }}"
        echo ""
        echo "Test Suites Executed:"
        echo "  - Unit and logic tests (pytest tests/ -v -m 'not perf')"
        echo "  - Performance tests (pytest tests/test_performance.py -v)"
        echo ""
        echo "Workflow completed at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        echo "::endgroup::"
