services:
  db_test:
    image: postgres:14
    container_name: crs_vpn_db_test
    environment:
      POSTGRES_DB: crs_vpn_test
      POSTGRES_USER: crs_user_test
      POSTGRES_PASSWORD: crs_pass_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crs_user_test -d crs_vpn_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - test_network

  redis_test:
    image: redis:7-alpine
    container_name: crs_vpn_redis_test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - test_network

  bot_test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crs_vpn_bot_test
    environment:
      - DATABASE_URL=postgresql://crs_user_test:crs_pass_test@db_test:5432/crs_vpn_test
      - REDIS_URL=redis://redis_test:6379/0
      - PYTHONPATH=/app/src
      - TEST_DATABASE_URL=postgresql+asyncpg://crs_user_test:crs_pass_test@db_test:5432/crs_vpn_test
    depends_on:
      db_test:
        condition: service_healthy
      redis_test:
        condition: service_healthy
    networks:
      - test_network
    volumes:
      - .:/app
    command: >
      sh -c "
        echo 'Ожидание готовности тестовой БД...' &&
        sleep 3 &&
        echo 'Применение миграций к тестовой БД...' &&
        PYTHONPATH=/app/src python3 -m alembic upgrade head &&
        echo 'Тестовая БД готова к использованию' &&
        tail -f /dev/null
      "

networks:
  test_network:
    driver: bridge

