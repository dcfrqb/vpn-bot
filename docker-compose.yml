services:
  db:
    image: postgres:14
    container_name: crs_vpn_db
    restart: unless-stopped
    profiles:
      - legacy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crs_vpn}
      POSTGRES_USER: ${POSTGRES_USER:-crs_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crs_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crs_user} -d ${POSTGRES_DB:-crs_vpn}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crs_vpn_migrate
    profiles:
      - legacy
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://${POSTGRES_USER:-crs_user}:${POSTGRES_PASSWORD:-crs_pass}@db:5432/${POSTGRES_DB:-crs_vpn}}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src/app/db/migrations:/app/src/app/db/migrations
    command: ["sh", "-c", "PYTHONPATH=/app/src python3 -m alembic upgrade head"]

  redis:
    image: redis:7-alpine
    container_name: crs_vpn_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crs_vpn_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - BOT_MODE=${BOT_MODE:-legacy}
      - PREFLIGHT_DOCKER=1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    command: ["sh", "-c", "PYTHONPATH=/app/src python3 -m app.main"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  webhook-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crs_vpn_webhook_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - BOT_MODE=${BOT_MODE:-legacy}
      - WEBHOOK_API_PORT=${WEBHOOK_API_PORT:-8001}
      - PREFLIGHT_DOCKER=1
    depends_on:
      redis:
        condition: service_healthy
      bot:
        condition: service_started
    volumes:
      - ./logs:/app/logs
    ports:
      - "${WEBHOOK_API_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: ["sh", "-c", "PYTHONPATH=/app/src python3 -m app.api.server"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data: {}
