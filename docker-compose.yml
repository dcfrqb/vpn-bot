version: "3.9"
services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: crs_vpn
      POSTGRES_USER: crs_user
      POSTGRES_PASSWORD: crs_pass
    ports: ["5432:5432"]
    volumes: [db_data:/var/lib/postgresql/data]

  redis:
    image: redis:7
    ports: ["6379:6379"]

volumes:
  db_data: