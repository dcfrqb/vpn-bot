[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Подавление warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestConfigWarning

# Маркеры для тестов
markers =
    integration: интеграционные тесты (требуют тестовую БД)
    unit: unit тесты (могут работать без БД)
    slow: медленные тесты производительности (не блокируют CI)






